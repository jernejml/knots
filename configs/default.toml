# Default config for the knots pipeline. Pass via `--config configs/default.toml`
# on any stage script. Each `[<stage>]` table maps to one script; keys map to
# that script's argparse `dest` (i.e. the long-flag name with dashes → underscores).
#
# CLI flags continue to override config values, so iterating with
# `python3 scripts/train_yolo.py --config configs/default.toml --epochs 200`
# is the natural flow. Unknown keys raise loudly — typos won't silently no-op.
#
# Sections you don't recognise are ignored: one shared config can drive many
# stages, or you can write narrow per-stage variants.

[analyze_dataset]
bg_max            = 30
row_bright_frac   = 0.5
dark_wood_max     = 120
min_chroma        = 15
bucket_thresholds = "0.25,1,4"
near_T_min_px     = 5.0
near_T_rel        = 0.25
edge_touch_tol_px = 1.0

[board_features]
sort  = "frames"
order = "asc"
limit = 20

[make_splits]
seed             = 42
ratios           = "80,10,10"
min_frames_train = 3
audit_threshold  = 0.20
# Repeatable --stratify flag: TOML list of strings, each parsed by argparse.
stratify         = ["frames:10,23", "cluster_frac:0"]

[sam_polygons]
model  = "sam2.1_s.pt"
device = "cuda:0"
limit  = 0

[train_yolo]
model    = "yolo11m-seg.pt"
epochs   = 100
imgsz    = 640
batch    = 16
patience = 20
workers  = 8
device   = "0"
name     = "train"

[export_onnx]
imgsz    = 640
opset    = 17
simplify = false
device   = "cpu"

[eval_yolo]
split  = "test"
imgsz  = 640
batch  = 16
device = "0"

[dataset_stats]
sort  = "frames"
order = "asc"
limit = 20
