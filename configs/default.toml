# Default config for the knots pipeline. Pass via `--config configs/default.toml`
# on any stage script. Each `[<stage>]` table maps to one script; keys map to
# that script's argparse `dest` (i.e. the long-flag name with dashes → underscores).
#
# CLI flags continue to override config values, so iterating with
# `python3 scripts/train_yolo.py --config configs/default.toml --epochs 200`
# is the natural flow. Unknown keys raise loudly — typos won't silently no-op.
#
# Sections you don't recognise are ignored: one shared config can drive many
# stages, or you can write narrow per-stage variants.

[prepare]
seed             = 42
ratios           = "80,10,10"
min_frames_train = 3
near_gap_min_px  = 5.0
near_gap_rel     = 0.25
# Repeatable --stratify flag: TOML list of strings, each parsed by argparse.
stratify         = ["frames:10,23", "cluster_frac:0"]

[sam_polygons]
model  = "sam2.1_s.pt"   # was _s; SAM is fast enough — go big once, polygons are cached on disk
device = "cuda:0"
limit  = 0

[train_yolo]
model         = "yolo11n-seg.pt"   # was 11m; nano for fast iteration loops
epochs        = 50                 # was 100; tighten for iteration, raise for final runs
imgsz         = 640
batch         = 32                 # was 16; nano leaves VRAM headroom — back off if OOM
patience      = 10                 # was 20; matches the shorter epoch budget
workers       = 8
device        = "0"
name          = "train"
# ONNX export (runs at the tail of train_yolo.py). imgsz inherits the training value.
opset          = 17
simplify       = false
export_device  = "cpu"
export_weights = "last"   # best | last; best-val selection is weak under SAM pseudo-labels

[eval_yolo]
split  = "test"
imgsz  = 640
batch  = 16
device = "0"

[dataset_stats]
sort  = "frames"
order = "asc"
limit = 20
